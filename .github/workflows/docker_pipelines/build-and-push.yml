name: Docker Build and Push

on:
  workflow_call:
    secrets:
      DOCKER_USERNAME: 
        required: true
      DOCKER_PASSWORD: 
        required: true
    inputs:
      run_number:
        required: true
        type: string

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/docker-training-2026:${{ inputs.run_number }} \
            -t ${{ secrets.DOCKER_USERNAME }}/docker-training-2026:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/docker-training-2026:${{ inputs.run_number }}
          docker push ${{ secrets.DOCKER_USERNAME }}/docker-training-2026:latest