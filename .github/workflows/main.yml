# This is a reusable workflow to build C# projects and generate assemblies

name: Build C# Assemblies

# Controls when the workflow will run
on:
  # Allows this workflow to be called from other workflows
  workflow_call:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checkout code
      - uses: actions/checkout@v4

      # Setup .NET SDK
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Restore dependencies
      - name: Restore dependencies
        run: dotnet restore

      # Build the project
      - name: Build
        run: dotnet build --configuration Release --no-restore

      # Publish the project to generate assemblies
      - name: Publish
        run: dotnet publish --configuration Release --output ./publish --no-build

      # Upload the generated assemblies as artifacts
      - name: Upload assemblies
        uses: actions/upload-artifact@v4
        with:
          name: csharp-assemblies
          path: ./publish/