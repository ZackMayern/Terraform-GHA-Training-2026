apiVersion: v1
kind: Namespace
metadata:
  name: weather-app
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-app
  namespace: weather-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: weather-app
  template:
    metadata:
      labels:
        app: weather-app
    spec:
      containers:
      - name: weather-app
        image: 980637429038.dkr.ecr.ap-south-1.amazonaws.com/weather-app-dotnet:1.0
        ports:
        - containerPort: 8080
        env:
        - name: ASPNETCORE_HTTP_PORTS
          value: "8080"
        # DB/Redis usage disabled in mock-only mode.
        # - name: ConnectionStrings__DefaultConnection
        #   valueFrom:
        #     secretKeyRef:
        #       name: weather-secrets
        #       key: ConnectionStrings__DefaultConnection
        # - name: ConnectionStrings__Redis
        #   valueFrom:
        #     secretKeyRef:
        #       name: weather-secrets
        #       key: ConnectionStrings__Redis
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /api/weather?city=Mumbai
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /api/weather?city=Mumbai
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 20
          timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: weather-app-svc
  namespace: weather-app
spec:
  type: LoadBalancer
  selector:
    app: weather-app
  ports:
  - port: 80
    targetPort: 8080

# DB/Redis resources are intentionally removed for mock-only deployment.
# If needed later, reintroduce Secret/PVC/Postgres/Redis resources.
